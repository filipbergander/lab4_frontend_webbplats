<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 4 | Webbplats (Backend)</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="MyWebSite">
    <link rel="manifest" href="/favicon/site.webmanifest">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <a href="/">Hem</a>
                </li>
                <li><a class="current-page" href="login.html">Inloggning</a></li>
                <li><a href="register.html">Registrera</a></li>
            </ul>
        </nav>
    </header>
    <main class="form-main">
        <h1>Inloggning till webbplatsen</h1>
        <form id="login-user-form" method="post">
            <legend>Logga in</legend>
            <div class="error-message">
                <ul></ul>
            </div>
            <div class="success-message">
                <ul></ul>
            </div>
            <div class="input-area">
                <label for="login-username">Användarnamn</label>
                <input type="text" id="login-username" name="username" placeholder="Skriv användarnamn">
            </div>

            <div class="input-area">
                <label for="login-email">Din email</label>
                <input type="text" id="login-email" name="email" placeholder="Skriv email">
            </div>

            <div class="input-area">
                <label for="login-password">Lösenord</label>
                <input type="password" id="login-password" name="password" placeholder="Skriv lösenord">
            </div>
            <button id="login-user-btn" type="submit">Enter<span id="login-user-icon"
                    class="material-symbols-outlined">login</span></button>
        </form>
    </main>
    <footer>Lab 4.2 Backend | Filip 2026</footer>
    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
