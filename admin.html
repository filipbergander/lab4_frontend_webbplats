<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4 | Admin</title>
    <script type="module" src="/src/js/authentication/checkAuth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="MyWebSite">
    <link rel="manifest" href="/favicon/site.webmanifest">
</head>

<body>
    <header>
        <nav>
            <ul class="menu-list">
                <li><a href="/">Hem</a></li>
                <li><a href="admin.html">Inlägg</a></li>
            </ul>
        </nav>
    </header>
    <main class="form-main">
        <div id="admin-user"></div>
        <h1>Skapa nyhetsinlägg</h1>
        <form id="add-news-form" method="post">
            <fieldset>
                <legend>Skriv inlägg</legend>
                <div class="error-message">
                    <ul></ul>
                </div>
                <div class="success-message">
                    <ul></ul>
                </div>
                <div class="loading-spinner hidden"></div>
                <div class="input-area">
                    <label for="news-headline">Rubrik</label>
                    <input type="text" id="news-headline" name="headline" placeholder="Skriv rubrik">
                </div>

                <div class="input-area">
                    <label for="news-content">Innehåll</label>
                    <textarea id="news-content" name="content" rows="4" cols="50" placeholder="Skriv innehåll"></textarea>
                </div>

                <div class="input-area">
                    <label for="news-author">Skribent</label>
                    <input type="text" id="news-author" name="author" placeholder="Skriv skribent">
                </div>
                <button id="add-news-btn" type="submit">Publicera<span id="add-news-icon"
                        class="material-symbols-outlined">
                        add_ad
                    </span></button>
            </fieldset>
        </form>
    </main>
    <footer>Lab 4.2 Backend | Filip 2026</footer>
    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
